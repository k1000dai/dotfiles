version = 1

# pixi / uv 自体は bootstrap の都合で script/setup.sh 側で先に入れます。
# rust-analyzer / codex / fonts など、system 依存や別配布のものはここでは無理に束ねません。

[envs.cli]
channels = ["conda-forge"]
dependencies = { bat = "*", cmake = "*", dvc = "*", ffmpeg = "*", fzf = "*", gh = "*", git = "*", git-lfs = "*", lazygit = "*", ripgrep = "*", tmux = "*", wget = "*", yazi = "*", zoxide = "*" }
exposed = { bat = "bat", cmake = "cmake", dvc = "dvc", ffmpeg = "ffmpeg", ffprobe = "ffprobe", fzf = "fzf", gh = "gh", git = "git", git-lfs = "git-lfs", lazygit = "lazygit", rg = "rg", tmux = "tmux", wget = "wget", ya = "ya", yazi = "yazi", zoxide = "zoxide" }

[envs.go-ghq]
channels = ["conda-forge"]
dependencies = { go-ghq = "*" }
exposed = { ghq = "ghq" }

[envs.python]
channels = ["conda-forge"]
dependencies = { python = "3.12.*", ruff = "*", uv = "*" }
exposed = { python = "python", python3 = "python3", ruff = "ruff", uv = "uv", uvx = "uvx" }

[envs.neovim]
channels = ["conda-forge"]
dependencies = { lua = "*", luarocks = "*", neovim = "*", nvim = "*", nodejs = "*", python = "3.12.*", tree-sitter-cli = "*" }
exposed = { lua = "lua", luarocks = "luarocks", node = "node", npm = "npm", nvim = "nvim", tree-sitter = "tree-sitter" }

[envs.lsp]
channels = ["conda-forge"]
dependencies = { bash-language-server = "*", clang-tools = "*", dockerfile-language-server-nodejs = "*", go = "*", gopls = "*", lua-language-server = "*", marksman = "*", nodejs = "*", taplo = "*", ty = "*", typescript = "*", typescript-language-server = "*", vscode-langservers-extracted = "*", yaml-language-server = "*" }
exposed = { bash-language-server = "bash-language-server", clangd = "clangd", clang-format = "clang-format", clang-tidy = "clang-tidy", docker-langserver = "docker-langserver", go = "go", gopls = "gopls", lua-language-server = "lua-language-server", marksman = "marksman", taplo = "taplo", tsc = "tsc", tsserver = "tsserver", ty = "ty", typescript-language-server = "typescript-language-server", vscode-css-language-server = "vscode-css-language-server", vscode-eslint-language-server = "vscode-eslint-language-server", vscode-html-language-server = "vscode-html-language-server", vscode-json-language-server = "vscode-json-language-server", yaml-language-server = "yaml-language-server" }
